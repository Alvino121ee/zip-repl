kind = "web"
previewPath = "/"
title = "CryptoSaham Predictor"
version = "1.0.0"
id = "artifacts/crypto-saham"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18124

[services.development]
run = "pnpm --filter @workspace/crypto-saham run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crypto-saham", "run", "build" ]
publicDir = "artifacts/crypto-saham/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18124"
BASE_PATH = "/"
